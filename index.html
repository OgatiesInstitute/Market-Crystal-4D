<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Market Crystal 4D</title>
    <style>
        body { margin: 0; background-color: #000; overflow: hidden; color: gold; font-family: 'Georgia', serif; }
        #title { position: absolute; top: 20px; width: 100%; text-align: center; z-index: 100; pointer-events: none; }
    </style>
</head>
<body>
    <div id="title">
        <h1>Market Crystal 4D</h1>
        <div id="current-date">Initializing Universe...</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, points;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 10; // 粒に近づけます

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            fetch('crystal_4d.json')
                .then(response => response.json())
                .then(data => {
                    const latestData = data[data.length - 1].data;
                    document.getElementById('current-date').innerText = data[data.length - 1].date;
                    createPoints(latestData);
                    animate();
                })
                .catch(err => {
                    document.getElementById('current-date').innerText = "Data load error.";
                });
        }

        function createPoints(data) {
            const geometry = new THREE.BufferGeometry();
            const positions = [];
            const colors = [];
            const colorObj = new THREE.Color();

            data.forEach(p => {
                // ここが重要！密集を避けるために座標を「15倍」に拡大します
                positions.push(p.x * 15, p.y * 15, p.z * 15);
                colorObj.set(p.c);
                colors.push(colorObj.r, colorObj.g, colorObj.b);
            });

            geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));

            // 粒を少し大きく、光り輝く設定に（size: 0.2）
            const material = new THREE.PointsMaterial({ 
                size: 0.2, 
                vertexColors: true, 
                blending: THREE.AdditiveBlending,
                transparent: true,
                opacity: 0.8
            });
            points = new THREE.Points(geometry, material);
            scene.add(points);
        }

        function animate() {
            requestAnimationFrame(animate);
            if (points) {
                points.rotation.y += 0.005; // ゆっくり回転
                points.rotation.z += 0.002;
            }
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
