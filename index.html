<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Market Crystal 4D</title>
    <style>
        body { margin: 0; background-color: #000; overflow: hidden; color: gold; font-family: 'Georgia', serif; }
        #title { position: absolute; top: 20px; width: 100%; text-align: center; z-index: 100; pointer-events: none; }
    </style>
</head>
<body>
    <div id="title">
        <h1>Market Crystal 4D</h1>
        <div id="current-date">Loading Market Data...</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, points;
        let animationData = [];

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 15;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            fetch('crystal_4d.json')
                .then(response => response.json())
                .then(data => {
                    animationData = data;
                    if (data.length > 0) {
                        createPoints(data[0].data);
                        document.getElementById('current-date').innerText = data[0].date;
                        animate();
                    }
                })
                .catch(err => {
                    document.getElementById('current-date').innerText = "Data load error. Check crystal_4d.json.";
                    console.error(err);
                });
        }

        function createPoints(data) {
            const geometry = new THREE.BufferGeometry();
            const positions = [];
            const colors = [];
            const colorObj = new THREE.Color();

            data.forEach(p => {
                // 座標を5倍に強調して表示
                positions.push(p.x * 5, p.y * 5, p.z);
                colorObj.set(p.c);
                colors.push(colorObj.r, colorObj.g, colorObj.b);
            });

            geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));

            const material = new THREE.PointsMaterial({ size: 0.15, vertexColors: true, blending: THREE.AdditiveBlending });
            points = new THREE.Points(geometry, material);
            scene.add(points);
        }

        function animate() {
            requestAnimationFrame(animate);
            if (points) {
                points.rotation.y += 0.005;
                points.rotation.x += 0.002;
            }
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
