<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Market Crystal 4D</title>
    <style>
        body { margin: 0; background-color: #000; overflow: hidden; color: gold; font-family: 'Georgia', serif; }
        #title { position: absolute; top: 20px; width: 100%; text-align: center; z-index: 100; pointer-events: none; }
    </style>
</head>
<body>
    <div id="title">
        <h1>Market Crystal 4D</h1>
        <div id="current-date">Aligning 225 Market Stars...</div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, points;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 15; // 宇宙全体が見えるように少し引きます

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            fetch('crystal_4d.json')
                .then(r => r.json())
                .then(data => {
                    const latest = data[data.length - 1];
                    document.getElementById('current-date').innerText = latest.date;
                    createPoints(latest.data);
                    animate();
                })
                .catch(err => {
                    document.getElementById('current-date').innerText = "Data load error.";
                });
        }

function createPoints(data) {
            const geometry = new THREE.BufferGeometry();
            const pos = [], cols = [], cObj = new THREE.Color();

            data.forEach((p, i) => {
                // AIが計算した座標(p.x, p.y)をそのまま使い、見やすいように3倍程度に広げます
                // z軸は、あなたが設定した「銘柄順の高さ」がそのまま反映されます
                pos.push(p.x * 3, p.y * 3, p.z);
                
                cObj.set(p.c);
                cols.push(cObj.r, cObj.g, cObj.b);
            });

            geometry.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
            geometry.setAttribute('color', new THREE.Float32BufferAttribute(cols, 3));
            
            const mat = new THREE.PointsMaterial({ 
                size: 0.15, 
                vertexColors: true, 
                blending: THREE.AdditiveBlending, 
                transparent: true, 
                opacity: 0.8 
            });
            
            points = new THREE.Points(geometry, mat);
            scene.add(points);
        }
        function animate() {
            requestAnimationFrame(animate);
            if(points) { 
                points.rotation.y += 0.005; 
                points.rotation.z += 0.002; 
            }
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
